version: "3.3"

services:
  sonarr:
    image: ghcr.io/linuxserver/sonarr
    container_name: sonarr
    networks:
      static-network:
        ipv4_address: 172.21.0.101
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Manila
    volumes:
      - /var/nfs/sonarr:/config
      - /var/nfs/sonarr:/var/nfs/sonarr # fileshare
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr
    networks:
      static-network:
        ipv4_address: 172.21.0.102
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Manila
    volumes:
      - /var/nfs/radarr:/config
      - /var/nfs/radarr:/var/nfs/radarr # filesahre
    ports:
      - 7878:7878
    restart: unless-stopped

  jackett:
    image: ghcr.io/linuxserver/jackett
    container_name: jackett
    networks:
      static-network:
        ipv4_address: 172.21.0.103
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Manila
      - AUTO_UPDATE=true #optional
    volumes:
      - /var/nfs/jackett:/config
    ports:
      - 9117:9117
    restart: unless-stopped
  nginx:
    image: nginx
    container_name: nginx
    networks:
      static-network:
        ipv4_address: 172.21.0.180
    volumes:
      - /var/nfs/nginx/conf:/etc/nginx/conf.d
      - /var/nfs/nginx/html/:/usr/share/nginx/html
    ports:
      - "80:80"
    environment:
      - NGINX_PORT=80
networks:
  static-network:
    ipam:
      config:
        - subnet: 172.21.0.0/16
          #docker-compose v3+ do not use ip_range
          #ip_range: 172.28.5.0/24
